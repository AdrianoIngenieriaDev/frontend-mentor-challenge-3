<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <img src="assets/images/avatar.jpg" alt="avatar-image">
      <h1>Adriano Cittadini Romano</h1>
      <p class="location">Chubut, Argentina</p>
      <p class="experience">"Front-end developer</p>
      <div class="buttons">
        <button class="github-button">GitHub</button>
        <button class="frontend-challenges">Frontend-mentor Challenges</button>
        <button class="linkedin">linkedin</button>
        <button class="twitter">Twitter</button>
        <button class="instagram">instagram</button>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Adriano Cittadini Romano</a>.
  </footer>
</body>
</html>
